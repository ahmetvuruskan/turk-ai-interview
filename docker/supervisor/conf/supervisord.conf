[supervisord]
nodaemon=true

[program:php-fpm]
command=php-fpm
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/php-fpm.err.log
stdout_logfile=/var/log/supervisor/php-fpm.out.log
stopsignal=QUIT


[program:queue-work]
command=php /var/www/html/artisan queue:work
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/queue-work.err.log
stdout_logfile=/var/log/supervisor/queue-work.out.log
stopsignal=QUIT
